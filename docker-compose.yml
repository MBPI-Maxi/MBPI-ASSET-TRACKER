
services:
  backend:
    build: ./backend
    image: myproject-backend:latest # name of the image
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      - db

  frontend:
    build: ./frontend
    image: myproject-frontend:latest # specify image name and tag here 
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
    env_file:
      - ./frontend/.env

  db:
    image: postgres:16
    restart: always
    environment:
      # POSTGRES_DB: asset_tracker_dev
      POSTGRES_DB: docker_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
  node_modules:

